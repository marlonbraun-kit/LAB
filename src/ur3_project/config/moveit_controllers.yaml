# MoveIt controller manager bindings.
#
# Tells MoveIt which ros2_control controllers to drive when executing a
# planned trajectory. The names below must match the controller names in
# config/ur3_controllers.yaml.

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - joint_trajectory_controller
    - gripper_controller

  joint_trajectory_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

  # The gripper is exposed as JointGroupPositionController (Float64MultiArray
  # commands), not as a FollowJointTrajectory action server. We therefore
  # do NOT let MoveIt drive it directly — pick_place_manager publishes the
  # finger commands itself. This entry is kept so the gripper joints are
  # known to MoveIt for collision attachment.
  gripper_controller:
    type: GripperCommand
    action_ns: gripper_cmd
    default: false
    joints:
      - gripper_left_finger_joint
