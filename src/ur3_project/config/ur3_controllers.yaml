controller_manager:
  ros__parameters:

    update_rate: 100  # Hz

    # ── Broadcasters ────────────────────────────────────────────────────
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    io_and_status_controller:
      type: ur_controllers/GPIOController

    speed_scaling_state_broadcaster:
      type: ur_controllers/SpeedScalingStateBroadcaster

    force_torque_sensor_broadcaster:
      type: ur_controllers/ForceTorqueStateBroadcaster

    # ── Arm trajectory controllers ───────────────────────────────────────
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    scaled_joint_trajectory_controller:
      type: ur_controllers/ScaledJointTrajectoryController

    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    forward_position_controller:
      type: position_controllers/JointGroupPositionController

    # ── Gripper controller ───────────────────────────────────────────────
    # Controls both finger joints simultaneously with equal position commands.
    # The gripper_controller topic is:
    #   /gripper_controller/commands  (std_msgs/Float64MultiArray)
    # Values: [left_finger_pos, right_finger_pos]  both in [0.0, 0.020] m
    #   0.000 m = fingers fully closed  (0 mm inner gap  — fingers touching)
    #   0.040 m = grip position        (80 mm inner gap  ≈ can Ø 78.86 mm + 1 mm/side)
    #   0.055 m = fully open           (110 mm inner gap — approach / release)
    gripper_controller:
      type: position_controllers/JointGroupPositionController


# ── Broadcaster parameters ───────────────────────────────────────────────

speed_scaling_state_broadcaster:
  ros__parameters:
    state_publish_rate: 100.0

force_torque_sensor_broadcaster:
  ros__parameters:
    sensor_name: tcp_fts_sensor
    state_interface_names:
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z
    frame_id: tool0
    topic_name: ft_data


# ── Arm trajectory controller parameters ────────────────────────────────

joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 2.0
      shoulder_pan_joint:  { trajectory: 0.5, goal: 0.1 }
      shoulder_lift_joint: { trajectory: 0.5, goal: 0.1 }
      elbow_joint:         { trajectory: 0.5, goal: 0.1 }
      wrist_1_joint:       { trajectory: 0.5, goal: 0.1 }
      wrist_2_joint:       { trajectory: 0.5, goal: 0.1 }
      wrist_3_joint:       { trajectory: 0.5, goal: 0.1 }

scaled_joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 2.0
      shoulder_pan_joint:  { trajectory: 1.0, goal: 0.1 }
      shoulder_lift_joint: { trajectory: 1.0, goal: 0.1 }
      elbow_joint:         { trajectory: 1.0, goal: 0.1 }
      wrist_1_joint:       { trajectory: 1.0, goal: 0.1 }
      wrist_2_joint:       { trajectory: 1.0, goal: 0.1 }
      wrist_3_joint:       { trajectory: 1.0, goal: 0.1 }

forward_velocity_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    interface_name: velocity

forward_position_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint


# ── Gripper controller parameters ────────────────────────────────────────

gripper_controller:
  ros__parameters:
    joints:
      - gripper_left_finger_joint
      - gripper_right_finger_joint
